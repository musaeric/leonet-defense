<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050A14" />
    <meta name="description" content="LeoNet Defense — AI-Powered Quantum Cybersecurity Platform" />
    <title>LeoNet Defense</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body {
        background: #050A14;
        color: #E0EFFF;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: #0D1B2A; }
      ::-webkit-scrollbar-thumb { background: #1E3A5F; border-radius: 2px; }
      @keyframes pulse-glow {
        0%, 100% { opacity: 1; box-shadow: 0 0 8px currentColor; }
        50%       { opacity: 0.6; box-shadow: 0 0 20px currentColor; }
      }
      @keyframes scan-line {
        0%   { top: 0; }
        100% { top: 100%; }
      }
      @keyframes float-up {
        0%   { transform: translateY(0) scale(1); opacity:1; }
        100% { transform: translateY(-40px) scale(0.6); opacity:0; }
      }
      @keyframes spin-slow {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes radar-sweep {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
      @keyframes slide-in-right { from{transform:translateX(40px);opacity:0} to{transform:translateX(0);opacity:1} }
      @keyframes fade-in { from{opacity:0} to{opacity:1} }
      @keyframes matrix-fall { 0%{transform:translateY(-100%);opacity:1} 100%{transform:translateY(100vh);opacity:0} }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
