<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050A14" />
    <meta name="description" content="LeoNet Defense — AI-Powered Quantum Cybersecurity Platform" />
    <link rel="icon" type="image/jpeg" href="/logo.jpg" />
    <title>LeoNet Defense</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body {
        background: #050A14;
        color: #E0EFFF;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: #0D1B2A; }
      ::-webkit-scrollbar-thumb { background: #1E3A5F; border-radius: 2px; }
      @keyframes pulse-glow {
        0%, 100% { opacity: 1; box-shadow: 0 0 8px currentColor; }
        50%       { opacity: 0.6; box-shadow: 0 0 20px currentColor; }
      }
      @keyframes scan-line {
        0%   { top: 0; }
        100% { top: 100%; }
      }
      @keyframes float-up {
        0%   { transform: translateY(0) scale(1); opacity:1; }
        100% { transform: translateY(-40px) scale(0.6); opacity:0; }
      }
      @keyframes spin-slow {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes radar-sweep {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
      @keyframes slide-in-right { from{transform:translateX(40px);opacity:0} to{transform:translateX(0);opacity:1} }
      @keyframes fade-in { from{opacity:0} to{opacity:1} }
      @keyframes matrix-fall { 0%{transform:translateY(-100%);opacity:1} 100%{transform:translateY(100vh);opacity:0} }
      @keyframes magnet-pull {
        0%   { transform: translate(var(--sx), var(--sy)) scale(1);   opacity: 1; }
        70%  { transform: translate(calc(var(--sx)*0.15), calc(var(--sy)*0.15)) scale(0.7); opacity: 0.9; }
        100% { transform: translate(0,0) scale(0); opacity: 0; }
      }
      @keyframes neutralize {
        0%   { transform: scale(1);   opacity: 1; background: #FF2D55; }
        40%  { transform: scale(1.6); opacity: 0.8; background: #FF6B35; }
        80%  { transform: scale(0.6); opacity: 0.5; background: #00FF88; }
        100% { transform: scale(0);   opacity: 0; }
      }
      @keyframes magnet-ring {
        0%   { transform: scale(0.8); opacity: 0.6; }
        100% { transform: scale(2.2); opacity: 0; }
      }
      @keyframes lure-ping {
        0%   { transform: scale(1); box-shadow: 0 0 0 0 rgba(0,212,255,0.7); }
        70%  { transform: scale(1); box-shadow: 0 0 0 14px rgba(0,212,255,0); }
        100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0,212,255,0); }
      }
      @keyframes suck-in {
        0%   { opacity:1; transform: scale(1) rotate(0deg); }
        100% { opacity:0; transform: scale(0.1) rotate(720deg); }
      }
      @keyframes captured-flash {
        0%,100% { background: rgba(0,255,136,0.08); }
        50%      { background: rgba(0,255,136,0.25); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
